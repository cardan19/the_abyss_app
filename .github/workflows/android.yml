name: Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      # Decode the keystore from the GitHub Secret and write it to disk
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      # Build a single universal APK (no --split-per-abi) so every Android
      # phone can install the same file — no more "wrong architecture" errors.
      - name: Build release APK
        env:
          KEYSTORE_PATH: upload-keystore.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TheAbyss-Android
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90
